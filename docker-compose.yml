services:

  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
      args:
        PB_VERSION: ${PB_VERSION}
    volumes:
      - pocketbase_data:/pb/pb_data
    networks:
      - internal
    restart: unless-stopped

  steinbp:
    build:
      context: .
      args:
        VITE_POCKETBASE_URL: ${VITE_POCKETBASE_URL}
    depends_on:
      - pocketbase
    networks:
      - internal
    ports:
      - "${APP_PORT:-80}:80"
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  pocketbase_data:
