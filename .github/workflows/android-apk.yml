name: Build Android APK

# Génère un APK Android (via Capacitor) avec l'icône du jeu.
# L'app charge le site en ligne (https://steinbp.fr, voir capacitor.config.json)
# comme une fenêtre native : pas besoin de reconstruire l'APK quand on modifie
# l'application — seulement si on change l'icône ou le nom.
# Lancement manuel depuis l'onglet "Actions" de GitHub.

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          # Le bundle web n'est pas utilisé par l'APK (qui charge le site en
          # ligne), mais Capacitor exige un dossier webDir présent. On fournit
          # l'URL par cohérence.
          VITE_POCKETBASE_URL: "https://steinbp.fr"
        run: npm run build

      - name: Install Capacitor toolchain
        run: npm install -D @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6 @capacitor/assets@3 sharp

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icon from game logo
        run: |
          node scripts/generate-app-icon.mjs
          npx capacitor-assets generate --android --iconBackgroundColor '#09090b' --iconBackgroundColorDark '#09090b'

      - name: Sync web build into Android project
        run: npx cap sync android

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: steinbp-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
